              schema:
                $ref: "#/components/schemas/policy_asset_info"
        #!macro:koios_errors!#
      summary: Policy Asset Information
      description: Get the information for all assets under the same policy
      operationId: policy_asset_info
/policy_asset_mints: #RPC
    get:
      tags:
